name: Actualizar Precios

on:
  workflow_dispatch:
    inputs:
      fecha:
        description: 'Fecha (YYYY-MM-DD) — dejar vacío para usar hoy'
        required: false
        default: ''
      co1:
        description: 'CO1 — precio'
        required: true
      co2:
        description: 'CO2 — precio'
        required: true
      co3:
        description: 'CO3 — precio'
        required: true
      co4:
        description: 'CO4 — precio'
        required: true
      co5:
        description: 'CO5 — precio'
        required: true
      co6:
        description: 'CO6 — precio'
        required: true
      co7:
        description: 'CO7 — precio'
        required: true
      co8:
        description: 'CO8 — precio'
        required: true
      co9:
        description: 'CO9 — precio'
        required: true
      co10:
        description: 'CO10 — precio'
        required: true
      modo:
        description: 'Modo — "nuevo" agrega fila nueva, "actualizar" modifica el último día'
        required: true
        default: 'nuevo'
        type: choice
        options:
          - nuevo
          - actualizar

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Actualizar precios en index.html
        run: |
          python3 .github/scripts/update_prices.py \
            --fecha "${{ github.event.inputs.fecha }}" \
            --co1   "${{ github.event.inputs.co1 }}" \
            --co2   "${{ github.event.inputs.co2 }}" \
            --co3   "${{ github.event.inputs.co3 }}" \
            --co4   "${{ github.event.inputs.co4 }}" \
            --co5   "${{ github.event.inputs.co5 }}" \
            --co6   "${{ github.event.inputs.co6 }}" \
            --co7   "${{ github.event.inputs.co7 }}" \
            --co8   "${{ github.event.inputs.co8 }}" \
            --co9   "${{ github.event.inputs.co9 }}" \
            --co10  "${{ github.event.inputs.co10 }}" \
            --modo  "${{ github.event.inputs.modo }}"

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html
          git diff --cached --quiet || git commit -m "data: precios ${{ github.event.inputs.fecha || 'hoy' }} — CO1=${{ github.event.inputs.co1 }}"
          git push
